# setup-env 走查产出 —— 方案: 主控 MSPM0G3507 + 视觉 K230（你们的实际栈）
# 锁版本原则: 不确定的标 "待核实(填回)"，由各 lane 装好后回填确切版本，保证 3 机一致。
# 源链接见 KB kb/资源链接总表.md（TI / 嘉楠 / VOFA+ 官方）。
version: "0.1"

lanes:
  host:                       # 跑 .claude/skills 工具的机器（lead）
    - {name: Python, kind: runtime, version: "3.13.x", source: python.org, verify: "python3 --version"}
    - {name: PyYAML, kind: pkg, version: ">=6.0", source: "pip / requirements.txt", verify: "python3 -c 'import yaml'"}
    - {name: requests, kind: pkg, version: ">=2.28", source: "pip / requirements.txt", verify: "python3 -c 'import requests'"}
    - {name: graphviz, kind: tool, version: "待核实", source: "brew/apt install graphviz", verify: "dot -V", notes: "Pass B 接线图渲染；缺则退化输出 DOT"}
    - {name: git, kind: tool, version: ">=2.30", source: 系统包, verify: "git --version"}

  control:                    # 控制 lane（MSPM0 固件）
    - {name: CCS Theia (Code Composer Studio), kind: ide, version: "待核实(CCS 12+/Theia)", source: "TI 官网 ti.com/tool/CCSTUDIO", verify: "能新建 MSPM0 工程并编译", notes: 主力 IDE}
    - {name: MSPM0 SDK, kind: sdk, version: "待核实(mspm0_sdk_x_xx)", source: "TI dev.ti.com / SDK 安装器", verify: "工程能引用 DriverLib", notes: DriverLib + 示例}
    - {name: SysConfig, kind: tool, version: "随 CCS/SDK", source: TI, verify: "能打开 .syscfg 生成 ti_msp_dl_config.c", notes: 引脚/外设图形配置}
    - {name: Arm GNU / TI clang 工具链, kind: tool, version: "待核实", source: 随 CCS, verify: "编译产出 .out/.hex"}
    - {name: XDS110 调试驱动, kind: tool, version: "待核实", source: 随 CCS / TI, verify: "LaunchPad 板载调试器可识别+烧录", notes: MSPM0 LaunchPad 板载 XDS110}
    - {name: VOFA+, kind: tool, version: "待核实(1.3.x)", source: vofa.plus, verify: "能收 JustFloat 多通道波形", notes: PID 在线整定上位机（KB08 JustFloat）}
    - {name: 串口助手, kind: tool, version: 任意, source: "厂商/开源", verify: 能开 COM 收发, notes: 协议联调}
    - {name: Keil MDK (备用), kind: ide, version: 待核实, source: keil.com, verify: STM32 工程可编译, notes: 仅备用 STM32 时}

  vision:                     # 算法 lane（K230）
    - {name: CanMV IDE, kind: ide, version: "待核实", source: "嘉楠 / 立创 CanMV", verify: "连 K230 进 IDE 能跑示例", notes: K230 MicroPython 开发}
    - {name: K230 固件镜像 (CanMV), kind: firmware, version: "待核实(锁定一个镜像版本三人一致)", source: "嘉楠官方 / 板厂 Wiki", verify: "板子启动进 CanMV REPL", notes: ★镜像版本必须三人锁同一个}
    - {name: USB-Serial 驱动, kind: tool, version: 待核实, source: 板厂, verify: 识别到 K230 串口, notes: 通信/烧录}
    - {name: 串口助手, kind: tool, version: 任意, source: 同上, verify: 能与主控对帧, notes: 验 contracts/protocol 帧}
